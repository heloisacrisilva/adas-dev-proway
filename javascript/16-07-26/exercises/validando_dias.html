<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício</title>
    <style>
      h1 {
        color: #630533;
      }

      button {
        border: none;
        border-radius: 5px;
        padding: 10px;
        background-color: #9c0950;
        color: white;
        transition: 10ms;
        &:hover {
          background-color: #e05096;
        }
      }

      input {
        border: solid 1px black;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Validando dias</h1>
    <label for="days">Informe um dia da semana em número: </label>
    <input type="number" name="day" id="day" required />
    <br />
    <br />
    <button type="submit" onclick="dayValidator()">Validar</button>
  </body>

  <script>
    var input = document.getElementById("day");
    function dayValidator() {
      const day = input.value;

      switch (day) {
        case "1":
          alert("Domingo");
          break;
        case "2":
          alert("Segunda-feira");
          break;
        case "3":
          alert("Terça-feira");
          break;
        case "4":
          alert("Quarta-feira");
          break;
        case "5":
          alert("Quinta-feira");
          break;
        case "6":
          alert("Sexta-feira");
          break;
        case "7":
          alert("Sábado");
          break;
        default:
          alert("Oops! Entrada inválida.");
          break;
      }
    }
  </script>
</html>
