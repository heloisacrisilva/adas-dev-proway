<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Quartos de Hotel</title>
</head>
<body>
    <h3>Controle de Quartos de Hotel</h2>

    <table border="1">
        <tr>
            <th rowspan="2">Andar</th>
            <th colspan="2">Quartos</th>
        </tr>
        <tr>
            <th>Número</th>
            <th>Status</th>
        </tr>
        <tr>
            <td rowspan="2"> 1ºAndar </td>
            <td> 101 </td>
            <td> Disponível </td>
        </tr>
        <tr>
            <td> 102 </td>
            <td> Ocupado </td>
        </tr>
        <tr>
            <td rowspan="2"> 2ºAndar </td>
            <td> 201 </td>
            <td> Limpeza </td>
        </tr>
        <tr>
            <td> 202 </td>
            <td> Disponível </td>
        </tr>

    </table>
</body>
</html>
