<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato</title>
    <link rel="stylesheet" href="./home.css" />
    <link rel="stylesheet" href="./contato.css" />
  </head>
  <body>
    <nav>
      <ul class="list">
        <li class="menu"><a href="./home.html">Home</a></li>
        <li class="menu"><a href="./sobre.html">Sobre</a></li>
        <li class="menu"><a href="./produtos.html">Produtos</a></li>
        <li class="menu"><a href="./contato.html">Contato</a></li>
      </ul>
    </nav>

    <div class="content">
      <h2>Contate-nos!</h2>
      <div class="form-box">
        <form action="./home.html" method="post">
          <label for="nome">Nome completo</label>
          <input
            type="text"
            id="nome"
            name="nome"
            required
            placeholder="Insira o seu nome"
            maxlength="40"
          />

          <label for="email">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="example@mail.com"
          />

          <label for="telefone">Telefone</label><br />
          <input
            type="text"
            id="telefone"
            name="telefone"
            placeholder="(00) 00000-0000"
            pattern="\d{2}\d{5}-\d{4}"
          />

          <label for="assunto">Assunto</label>
          <select name="assunto" id="assunto" required>
            <option value="outro">Outro</option>
            <option value="devolucao">Devolução</option>
            <option value="reclamacao">Reclamação</option>
            <option value="compras">Time Compras</option>
            <option value="suporte">Suporte</option>
          </select>

          <label for="mensagem">Mensagem</label>
          <textarea
            name="mensagem"
            id="mensagem"
            required
            placeholder="sua mensagem aqui..."
          ></textarea>

          <div class="button-box">
            <button class="submit" type="submit">Enviar</button>
            <button class="reset" type="reset">Limpar</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
