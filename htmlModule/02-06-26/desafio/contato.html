<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
</head>
<body>
    <table>
      <tr>
        <th>
          <a href="./home.html" style="color: #ff1493">Home</a>
          <a href="./sobre.html" style="color: #ff1493">Sobre</a>
          <a href="./produtos.html" style="color: #ff1493">Produtos</a>
          <a href="./contato.html" style="color: #ff1493">Contato</a>
        </th>
      </tr>
    </table>

    <h3>Formulário para contato: Lumina</h2>

    <form action="./home.html" method="post">
        <label for="nome">Nome completo</label>
        <input
                type="text"
                id="nome"
                name="nome"
                required
                placeholder="Insira o seu nome"
                maxlength="40"
            />

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required placeholder="example@mail.com"><br><br>
        
        <label for="telefone">Telefone</label><br>
        <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000"  pattern="\d{2}\d{5}-\d{4}"><br><br>

        <label for="assunto">Assunto</label><br>
        <select name="assunto" id="assunto" required>
          <option value="outro">Outro</option>
          <option value="devolucao">Devolução</option>
          <option value="reclamacao">Reclamação</option>
          <option value="compras">Time Compras</option>
          <option value="suporte">Suporte</option>
        </select><br><br>

        <label for="mensagem">Mensagem</label><br>
        <textarea name="mensagem" id="mensagem" required placeholder="sua mensagem aqui..."></textarea>
        
        <br /><br />
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
</body>
</html>
