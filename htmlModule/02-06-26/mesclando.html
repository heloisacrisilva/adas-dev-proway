<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplos Mesclando Tabelas</title>
  </head>
  <body>
    <h2>Exemplos Mesclando Tabelas</h2>

    <h3>Mesclando colunas</h2>

    <table border="1">
      <tr>
        <th colspan="100%">Relatório 4º Trimestre</th>
      </tr>
      <tr>
        <th>Mês</th>
        <th>Venda</th>
        <th>Meta</th>
      </tr>
      <tr>
        <td>Outubro</td>
        <td>R$20.000,00</td>
        <td>R$17.000,00</td>
      </tr>
      <tr>
        <td>Novembro</td>
        <td>R$35.000,00</td>
        <td>R$38.000,00</td>
      </tr>
      <tr>
        <td>Dezembro</td>
        <td>R$39.000,00</td>
        <td>R$38.000,00</td>
      </tr>
    </table>
    
    <h3>Mesclando linhas</h2>
    <table>
      <table border="1">
        <tr>
          <th>Departamento</th>
          <th>Colaborador</th>
        </tr>
        <tr>
          <td rowspan="2">Infra</td>
          <td>Hermione</td>
        </tr>
        <tr>
          <td>Malfoi</td>
        </tr>
        <tr>
          <td  rowspan="2">Web Dev</td>
          <td>Harry</td>
        <tr>
          <td>Drac</td>
        </tr>
      </table>
    </table>
  </body>
</html>
