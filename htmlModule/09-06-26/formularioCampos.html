<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário com Campos</title>
  </head>
  <body>
    <h1>Formulário com vários campos</h1>

    <form action="#" method="post">
      <label for="nome">Nome</label><br />
      <input
        type="text"
        id="nome"
        name="nome"
        required
        placeholder="Insira o seu nome"
        maxlength="40"
      /><br /><br />

      <label for="cpf">CPF</label><br />
      <input
        type="text"
        id="cpf"
        name="cpf"
        placeholder="000.000.000-00"
        pattern="\d{3}.\d{3}.\d{3}-\d{2}"
      /><br /><br />

      <label for="email">E-mail</label><br />
      <input
        type="email"
        id="email"
        name="email"
        required
        placeholder="example@mail.com"
      /><br /><br />

      <label for="senha">Senha</label><br />
      <input
        type="password"
        id="senha"
        name="senha"
        required
        minlength="6"
        placeholder="acima de 6 caracteres"
      /><br /><br />

      <label for="nascimento">Data de nascimento</label><br />
      <input
        type="date"
        id="nascimento"
        name="nascimento"
        required
      /><br /><br />

      <h2>Sessão selecionáveis:</h2>

      <input type="checkbox" id="credenciais" name="credenciais" checked />
      <label for="credenciais">Lembrar das minhas credenciais</label><br />

      <input type="checkbox" id="darkmode" name="darkmode" />
      <label for="darkmode">Ativar dark mode ao entrar no sistema</label><br />

      <h4>Selecione o turno de estudos:</h4>
      <input type="radio" id="manha" name="turno" checked />
      <label for="">Manhã</label>
      <input type="radio" id="tarde" name="turno" />
      <label for="">Tarde</label>
      <input type="radio" id="noite" name="turno" />
      <label for="">Noite</label><br /><br />

      <label for="foto">Foto de perfil</label><br />
      <input type="file" id="foto" name="foto" /><br /><br />

      <label for="formação">Escolha sua formação</label>
      <select name="formação" id="formação" required>
        <option value="options">Opções</option>
        <option value="java">Java</option>
        <option value="c#">C#</option>
        <option value="typescript">Typescript</option></select
      ><br /><br />

      <label for="sobre">Fale um pouco sobre você</label><br />
      <textarea
        name="sobre"
        id="sobre"
        placeholder="conte a sua trajetória..."
      ></textarea>

      <br /><br />
      <button type="submit">Enviar</button>
      <button type="reset">Limpar</button>
    </form>
  </body>
</html>
