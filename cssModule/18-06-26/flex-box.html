<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>

    <style>
      * {
        margin: 0;
        box-sizing: border-box;
      }
      .principal {
        padding: 1rem;
        background-color: rgb(242, 175, 249);
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: space-around;
        align-items: center;
        flex-direction: column;
        gap: 1rem;
      }
      .bloco {
        width: 10rem;
        height: 10rem;
        border-radius: 8px;
        background-color: rgb(253, 243, 156);
        text-align: center;
        font-size: 24px;
        align-content: center;
      }
    </style>
  </head>
  <body>
    <div class="principal">
      <div class="bloco">A</div>
      <div class="bloco">B</div>
      <div class="bloco">C</div>
    </div>
  </body>
</html>
