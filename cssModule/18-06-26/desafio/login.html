<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");

      * {
        margin: 0;
        font-family: "Poppins", sans-serif;
        box-sizing: border-box;
      }
      body {
        background-color: rgb(243, 181, 249);
      }
      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }
      h3 {
        font-size: 30px;
        font-weight: 500;
      }

      label {
        width: 100%;
      }

      form {
        width: 50%;
      }

      input {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }
      .container {
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .content {
        gap: 3rem;
        display: flex;
        justify-content: flex-start;
        padding: 2rem;
        width: 50%;
        height: 70%;
        border-radius: 8px;
        background-color: rgb(253, 243, 156);
        flex-direction: column;
        align-items: center;
      }
      .forms {
        gap: 2rem;
        display: flex;
        width: 100%;
        height: 100%;
        align-items: center;
        flex-direction: column;
      }

      button {
        padding: 0.5rem;
        border-radius: 0.5rem;
        border: none;
        cursor: pointer;
        width: 50%;
        background-color: #f8c7fd;

        &:hover {
           background-color: #400547;
           color: white;
        }
      }

      a {
        color: #400547;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="header">
          <img src="./image.png" alt="logo" style="height: 100px" />
          <h3>Authfy</h3>
        </div>
        <div class="forms">
          <form action="">
            <label for="user">Login</label>
            <input
              type="text"
              id="user"
              name="user"
              required
              placeholder="Insira o seu usuário"
              maxlength="20"
            />
          </form>
          <form action="">
            <label for="user">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              required
              placeholder="Insira o sua senha"
              maxlength="20"
            />
          </form>
          <button type="submit">Entrar</button>
          <a href="">Esqueceu sua senha? Recupere aqui.</span>
        </div>
      </div>
    </div>
  </body>
</html>
