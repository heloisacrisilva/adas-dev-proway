<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card: usando div</title>
    <link rel="stylesheet" href="./card.css" />
  </head>
  <body class="espaco-externo">
    <h1>Exemplo de card com div:</h1>

    <div class="card">
      <img
        src="https://images.tcdn.com.br/img/img_prod/1064087/hair_butter_mascara_oleos_marroquinos_500g_amend_2944_1_6fabd776bdf6697eecc838df734d49f8.png"
        alt="creme de hidratação"
      />
      <h3>Creme de hidratação</h3>
      <p>R$ 59,99</p>

      <button>Compre agora</button>
    </div>

    <div class="card">
      <img
        src="https://cdn.shoppub.io/cdn-cgi/image/w=1000,h=1000,q=80,f=auto/akaicosmeticos/media/uploads/produtos/foto/hzqhikdk/file.jpg"
        alt="creme de hidratação"
      />
      <h3>Shampoo</h3>
      <p>R$ 49,99</p>

      <button>Compre agora</button>
    </div>

    <div class="card">
        <img
          src="https://images.tcdn.com.br/img/img_prod/1142879/oleo_capilar_oil_reflections_100ml_wella_331_1_02417aaacf81769869fd64c279ca53e3.jpg"
          alt="creme de hidratação"
        />
        <h3>Oléo Capilar</h3>
        <p class="promo">PROMO: R$ 49,99</p>
  
        <button>Compre agora</button>
      </div>
  </body>
</html>
